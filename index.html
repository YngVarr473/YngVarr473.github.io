<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Финал квеста</title>

        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #ff7aa2, #ffc3d6, #ffe6ef);
                background-size: 400% 400%;
                animation: bgmove 10s infinite alternate;
            }

            @keyframes bgmove {
                0% {
                    background-position: left;
                }
                100% {
                    background-position: right;
                }
            }

            .card {
                background: white;
                padding: 50px;
                border-radius: 25px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
                text-align: center;
                max-width: 520px;
            }

            h1 {
                font-size: 38px;
                margin-bottom: 10px;
                color: #333;
            }

            p {
                font-size: 18px;
                color: #555;
            }

            video {
                margin-top: 20px;
                border-radius: 15px;
                width: 100%;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            }

            .room {
                margin-top: 25px;
                font-size: 70px;
                font-weight: bold;
                color: #ff3f83;
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.1);
                }
                100% {
                    transform: scale(1);
                }
            }

            .emoji {
                font-size: 40px;
                margin-bottom: 15px;
            }
        </style>
    </head>

    <body>
        <div class="card">
            <div class="emoji">🌸🎉🌸</div>

            <h1>Вы прошли квест!</h1>

            <p>Поздравляем. Вы справились со всеми испытаниями.</p>

            <p>Последняя подсказка привела вас сюда.</p>

            <img src="qr.gif" alt="QR code" width="200" height="200">
            
            <p>Финальная точка:</p>

            <div class="room">316</div>

            <p>Идите в этот кабинет. Там вас ждёт сюрприз.</p>
        </div>
    </body>
</html>
